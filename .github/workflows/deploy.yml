name: Deploy

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Publish
      run: dotnet publish SimpleRssServer/SimpleRssServer.fsproj --output publish/ -p:Version=${{ github.ref_name }}
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: publish/

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: publish
    environment: production

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: app
        path: publish/

    - name: Setup SSH
      env:
        VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        VPS_HOST: ${{ secrets.VPS_HOST }}
      run: |
        mkdir -p ~/.ssh
        echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan "$VPS_HOST" >> ~/.ssh/known_hosts

    - name: Deploy
      env:
        VPS_USER: ${{ secrets.VPS_USER }}
        VPS_HOST: ${{ secrets.VPS_HOST }}
      run: |
        ssh "$VPS_USER@$VPS_HOST" "
          sudo systemctl stop rssrdr-server.service
          find /var/www/rssrdr/* -not -name 'rss-cache' -not -path '/var/www/rssrdr/rss-cache/*' -exec rm -rf {} +
        "
        scp -r publish/* "$VPS_USER@$VPS_HOST:/var/www/rssrdr/"
        ssh "$VPS_USER@$VPS_HOST" "sudo systemctl start rssrdr-server.service"
