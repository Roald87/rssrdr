name: Deploy

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  LANG: "en_US.UTF-8"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Set locale to US
      run: |
        sudo locale-gen en_US.UTF-8
        sudo update-locale LANG=en_US.UTF-8
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Build
      run: dotnet build
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Lint
      run: |
        dotnet tool install -g dotnet-fsharplint
        dotnet fsharplint lint SimpleRssServer.sln

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      env:
        APP_VERSION: ${{ github.ref_name }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: APP_VERSION
        script: |
          set -e
          # Validate tag format before using it in any shell command
          if ! echo "$APP_VERSION" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: APP_VERSION '$APP_VERSION' is not a valid semver tag"
            exit 1
          fi
          su - rss -c "
            set -e

            cd /root/rssrdr
            git pull

            sed -i "s/<Version>.*<\/Version>/<Version>$APP_VERSION<\/Version>/" SimpleRssServer/SimpleRssServer.fsproj
            git add SimpleRssServer/SimpleRssServer.fsproj
            git commit -m "bump version number"

            sudo systemctl stop rssrdr-server.service
            find /var/www/rssrdr/* -not -name 'rss-cache' -not -path '/var/www/rssrdr/rss-cache/*' -exec rm -rf {} +
            dotnet publish SimpleRssServer/SimpleRssServer.fsproj --output /var/www/rssrdr/
            sudo systemctl start rssrdr-server.service
            git push
          "
