name: Deploy

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  LANG: "en_US.UTF-8"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Set locale to US
      run: |
        sudo locale-gen en_US.UTF-8
        sudo update-locale LANG=en_US.UTF-8
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Build
      run: dotnet build
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Lint
      run: |
        dotnet tool install -g dotnet-fsharplint
        dotnet fsharplint lint SimpleRssServer.sln
    - name: Publish
      run: dotnet publish SimpleRssServer/SimpleRssServer.fsproj --output publish/ -p:Version=${{ github.ref_name }}
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: publish/

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: app
        path: publish/

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy
      run: |
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
          sudo systemctl stop rssrdr-server.service
          find /var/www/rssrdr/* -not -name 'rss-cache' -not -path '/var/www/rssrdr/rss-cache/*' -exec rm -rf {} +
        "
        scp -r publish/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/rssrdr/
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo systemctl start rssrdr-server.service"
